<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitation Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{

    background:linear-gradient(135deg,#1f2937,#111827);

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}

.card{

    width:350px;

    background:white;

    border-radius:20px;

    padding:35px;

    text-align:center;

    box-shadow:0 20px 50px rgba(0,0,0,.3);

}

.title{

    font-size:24px;

    font-weight:bold;

    margin-bottom:20px;

}

.number{

    font-size:80px;

    color:#27ae60;

    font-weight:bold;

    margin:20px 0;

}

.status{

    color:#777;

}

.time{

    margin-top:20px;

    color:#888;

    font-size:14px;

}

.refresh{

    margin-top:25px;

    padding:12px 25px;

    border:none;

    border-radius:50px;

    background:#27ae60;

    color:white;

    cursor:pointer;

    font-size:16px;

}

.refresh:hover{

    background:#1f8b4e;

}

</style>

</head>

<body>

<div class="card">

<div class="title">
📊 Invitation Dashboard
</div>

<div class="number" id="count">
0
</div>

<div class="status">
Total Visitors
</div>

<div class="time" id="updated">
Updating...
</div>

<button
class="refresh"
onclick="loadCount()">
Refresh
</button>

</div>

<script>

async function loadCount(){

    try{

        const res = await fetch("https://sairamusik.com/count");

        const data = await res.json();

        document.getElementById("count").innerHTML = data.count;

        document.getElementById("updated").innerHTML =
            "Last Updated : " +
            new Date().toLocaleTimeString();

    }catch(err){

        console.error(err);

        document.getElementById("updated").innerHTML =
            "Cannot connect to server.";

    }

}

loadCount();

setInterval(loadCount,3000);

</script>

</body>
</html>
